<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insights | DealFlow Africa</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="ticker-mount"></div>
<div id="nav-mount"></div>

<div class="page-header">
  <div class="eyebrow">News &amp; Insights</div>
  <h1>Market <em>Commentary</em> &amp;<br>Macro Analysis</h1>
  <p>Deal analysis, macro drivers, and investment themes shaping African private capital in 2025.</p>
</div>

<section>
  <!-- Filter tabs -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:32px;">
    <button class="fbtn active" onclick="filterInsights('all',this)">All</button>
    <button class="fbtn" onclick="filterInsights('macro',this)">Macro Analysis</button>
    <button class="fbtn" onclick="filterInsights('',this)">Market Reports</button>
  </div>
  <div class="ins-grid" id="insightsGrid"></div>
</section>

<div id="footer-mount"></div>

<div class="login-overlay" id="loginOverlay">
  <div class="login-box">
    <div class="login-logo"><div class="lar"><span class="la">A</span><span class="lr">R</span></div><div class="lname">Achievers Regal</div></div>
    <h3>Admin Access</h3><p>Enter your password to manage content</p>
    <input type="password" id="loginInput" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Sign In &rarr;</button>
    <div class="login-err" id="loginErr">Incorrect password. Please try again.</div>
    <div style="margin-top:14px"><button onclick="document.getElementById('loginOverlay').classList.remove('open')" style="background:none;border:none;color:rgba(255,255,255,.35);font-size:11.5px;cursor:pointer;font-family:'DM Sans',sans-serif;">Cancel</button></div>
  </div>
</div>
<div class="admin-overlay" id="adminOverlay" style="display:none"></div>

<script src="_shared.js"></script>
<script>
var curType='all';
function filterInsights(type,btn){
  curType=type;
  document.querySelectorAll('.fbtn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  renderInsights();
}
function renderInsights(){
  var grid=document.getElementById('insightsGrid');
  var filtered=INSIGHTS.filter(function(ins){
    if(curType==='all') return true;
    return ins.type===curType;
  });
  grid.innerHTML=filtered.map(function(ins){
    var mc=ins.type==='macro'?' macro':'';
    var tgt=ins.url&&ins.url.indexOf('http')===0?'_blank':'_self';
    return '<a href="'+(ins.url||'contact.html')+'" class="ins-card'+mc+'" target="'+tgt+'">'
      +'<div class="ins-tag">'+ins.tag+'</div>'
      +'<div class="ins-title">'+ins.title+'</div>'
      +'<div class="ins-blurb">'+ins.blurb+'</div>'
      +'<div class="ins-link">'+(ins.type==='macro'?'Read Analysis':'Read Insight')+'</div>'
      +'</a>';
  }).join('');
}
renderInsights();
</script>
</body>
</html>
